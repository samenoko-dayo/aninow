name: Deploy AniNow
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'bun'

      - name: Install dependencies
        run: bun install

      - name: Install Wrangler CLI
        run: bun install -g wrangler@latest

      - name: Cache Image Cache
        uses: actions/cache@v4
        with:
          path: data/image-cache.json
          key: ${{ runner.os }}-image-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-image-cache-

      - name: Set Environment Variables & Build
        env:
          ANNICT_ACCESS_TOKEN: ${{ secrets.ANNICT_ACCESS_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          packageManager: bun
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aninow --branch main
